<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAITUR.AI — 100 SMB AI Automations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap');

/* ============================================
   NAITUR.AI DESIGN SYSTEM TOKENS
   Extracted from naitur.ai Webflow site
   ============================================ */
:root {
  /* Core palette — dark theme matching naitur.ai */
  --n-bg-page: #0a0a0a;
  --n-bg-surface: #141414;
  --n-bg-card: #1a1a1a;
  --n-bg-card-hover: #222222;
  --n-bg-elevated: #252525;

  /* Text hierarchy */
  --n-text-primary: #f0f0ec;
  --n-text-secondary: #a8a8a0;
  --n-text-tertiary: #6b6b64;
  --n-text-muted: #4a4a44;

  /* Brand accent (green from site) */
  --n-accent: #1D9E75;
  --n-accent-soft: rgba(29, 158, 117, 0.12);
  --n-accent-text: #3ddba0;

  /* Borders */
  --n-border: rgba(255,255,255,0.06);
  --n-border-hover: rgba(255,255,255,0.12);
  --n-border-active: rgba(255,255,255,0.18);

  /* Radius — matches Webflow card rounding */
  --n-radius-sm: 8px;
  --n-radius-md: 12px;
  --n-radius-lg: 16px;
  --n-radius-xl: 20px;

  /* Category colors — tuned for dark backgrounds */
  --c-revenue: #E8714A;
  --c-customer: #3ddba0;
  --c-operations: #5ea3f0;
  --c-productivity: #8b7ef0;
  --c-finance: #8bbf44;
  --c-hr: #e87098;
  --c-legal: #dba24a;
  --c-it: #8a8a82;
  --c-success: #3ddba0;
  --c-product: #8b7ef0;
  --c-ecommerce: #E8714A;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: var(--n-text-primary);
  background: var(--n-bg-page);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Container matches Webflow's max-width pattern */
.widget-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 3rem 2rem;
}

/* ---- HERO ---- */
.hero {
  text-align: center;
  margin-bottom: 2.5rem;
}
.hero h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300;
  font-size: clamp(24px, 4vw, 36px);
  letter-spacing: -0.025em;
  color: var(--n-text-primary);
  line-height: 1.2;
  margin-bottom: 0.5rem;
}
.hero h2 em {
  font-style: italic;
  font-weight: 500;
  color: var(--n-accent-text);
}
.hero .subtitle {
  font-size: 15px;
  color: var(--n-text-secondary);
  margin-bottom: 1rem;
}
.hero .badge {
  display: inline-block;
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: var(--n-accent-soft);
  color: var(--n-accent-text);
  border: 1px solid rgba(29,158,117,0.2);
}

/* ---- CATEGORY GRID ---- */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 1.5rem;
}
.cat-card {
  position: relative;
  background: var(--n-bg-card);
  border: 1px solid var(--n-border);
  border-radius: var(--n-radius-md);
  padding: 16px 18px 14px;
  cursor: pointer;
  transition: all 0.25s ease;
  overflow: hidden;
}
.cat-card:hover {
  background: var(--n-bg-card-hover);
  border-color: var(--n-border-hover);
  transform: translateY(-2px);
}
.cat-card.active {
  border-width: 1.5px;
}
.cat-card .icon-badge {
  width: 34px;
  height: 34px;
  border-radius: var(--n-radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 10px;
}
.cat-card .cat-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--n-text-primary);
  line-height: 1.3;
}
.cat-card .cat-count {
  font-size: 11px;
  color: var(--n-text-tertiary);
  margin-top: 3px;
}
.cat-card .progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2.5px;
  border-radius: 0 0 0 var(--n-radius-md);
  transition: width 0.4s ease;
}

/* ---- DETAIL PANEL ---- */
.detail-panel {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.45s ease, opacity 0.35s ease;
}
.detail-panel.open {
  max-height: 3000px;
  opacity: 1;
}
.detail-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0 10px;
  border-bottom: 1px solid var(--n-border);
  margin-bottom: 12px;
}
.detail-header .dh-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}
.detail-header .dh-title {
  font-size: 16px;
  font-weight: 500;
}
.detail-header .dh-count {
  font-size: 12px;
  color: var(--n-text-tertiary);
  margin-left: auto;
}
.close-btn {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1px solid var(--n-border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--n-text-secondary);
  margin-left: 8px;
  transition: all 0.15s;
}
.close-btn:hover {
  background: var(--n-bg-elevated);
  border-color: var(--n-border-hover);
}

/* ---- AUTOMATION LIST ---- */
.auto-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 4px;
  margin-bottom: 1.5rem;
}
.auto-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--n-radius-sm);
  transition: background 0.15s;
}
.auto-item:hover {
  background: var(--n-bg-elevated);
}
.auto-item .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 7px;
}
.auto-item .name {
  font-size: 13px;
  font-weight: 500;
  color: var(--n-text-primary);
  line-height: 1.35;
}
.auto-item .desc {
  font-size: 12px;
  color: var(--n-text-tertiary);
  margin-top: 1px;
  line-height: 1.35;
}

/* ---- CTA FOOTER ---- */
.widget-cta {
  text-align: center;
  padding: 2rem 0 0.5rem;
  border-top: 1px solid var(--n-border);
  margin-top: 1rem;
}
.widget-cta .cta-text {
  font-size: 13px;
  color: var(--n-text-secondary);
  margin-bottom: 14px;
}
.cta-button {
  display: inline-block;
  padding: 12px 36px;
  border-radius: 28px;
  border: none;
  background: var(--n-accent);
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.cta-button:hover {
  background: #1aad7e;
  transform: translateY(-1px);
}

/* ---- FOOTER BRANDING ---- */
.widget-footer {
  text-align: center;
  padding: 1.5rem 0 0.5rem;
  font-size: 11px;
  color: var(--n-text-muted);
}
.widget-footer span {
  color: var(--n-accent-text);
  font-weight: 500;
}

/* ---- RESPONSIVE ---- */
@media (max-width: 640px) {
  .widget-container { padding: 2rem 1rem; }
  .cat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .auto-list { grid-template-columns: 1fr; }
}
@media (max-width: 400px) {
  .cat-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

const icons = ["↗","♦","⚙","▸","$","♟","§","⛨","✦","◈","◉"];
const grid = document.getElementById('grid');
const panel = document.getElementById('detailPanel');
const inner = document.getElementById('detailInner');
let activeIdx = -1;

data.forEach((cat, i) => {
  const card = document.createElement('div');
  card.className = 'cat-card';
  const pct = (cat.items.length / 13 * 100);
  card.innerHTML = `
    <div class="icon-badge" style="background:${cat.bgAlpha};color:${cat.colorHex}">${icons[i]}</div>
    <div class="cat-name">${cat.name}</div>
    <div class="cat-count">${cat.items.length} automation${cat.items.length > 1 ? 's' : ''}</div>
    <div class="progress-bar" style="background:${cat.colorHex};width:${pct}%"></div>
  `;
  card.addEventListener('click', () => toggle(i));
  grid.appendChild(card);
});

function toggle(idx) {
  if (activeIdx === idx) {
    panel.classList.remove('open');
    document.querySelectorAll('.cat-card').forEach(c => { c.classList.remove('active'); c.style.borderColor = ''; });
    activeIdx = -1;
    return;
  }
  activeIdx = idx;
  const cat = data[idx];
  document.querySelectorAll('.cat-card').forEach((c, ci) => {
    c.classList.toggle('active', ci === idx);
    c.style.borderColor = ci === idx ? cat.colorHex : '';
  });

  inner.innerHTML = `
    <div class="detail-header">
      <div class="dh-icon" style="background:${cat.bgAlpha};color:${cat.colorHex}">${icons[idx]}</div>
      <div class="dh-title" style="color:${cat.colorHex}">${cat.name}</div>
      <div class="dh-count">${cat.items.length} automations</div>
      <button class="close-btn" onclick="toggle(${idx})">✕</button>
    </div>
    <div class="auto-list">
      ${cat.items.map(item => `
        <div class="auto-item">
          <div class="dot" style="background:${cat.colorHex}"></div>
          <div>
            <div class="name">${item.t}</div>
            <div class="desc">${item.d}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  panel.classList.add('open');
  setTimeout(() => panel.scrollIntoView({behavior:'smooth',block:'nearest'}), 100);
}

   // Post height to parent for iframe auto-resize
   const ro = new ResizeObserver(() => {
        parent.postMessage({
               type: 'resize',
               height: document.body.scrollHeight
        }, '*');
   });
   ro.observe(document.body);
</script>
